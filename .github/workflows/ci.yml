name: Shadow CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dev dependencies (no ML)
        run: cd backend && uv sync --extra dev

      - name: Ruff check
        run: cd backend && uv run ruff check .

      - name: Ruff format check
        run: cd backend && uv run ruff format --check .

  backend-tests:
    needs: lint
    runs-on: ubuntu-latest
    env:
      DISABLE_ML_MODELS: "true"
      TESTING: "true"
      SECRET_KEY: "ci-test-secret-key-do-not-use-in-production"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      ADMIN_EMAILS: "*"
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies (no ML for CI speed)
        run: cd backend && uv sync --extra dev

      - name: FastAPI import check
        run: cd backend && uv run python -c "from app.main import app; print('OK')"

      - name: Check Alembic migrations
        run: cd backend && uv run alembic check 2>/dev/null || echo "Alembic check skipped (no DB)"

      - name: Run tests with coverage
        run: |
          cd backend
          uv run pytest tests/ --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=65 -q

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Run tests
        run: cd frontend && npm run test:run -- --coverage

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: [lint, backend-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

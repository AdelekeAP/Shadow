# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=ai:10m rate=5r/s;

# === HTTP server ===
# This block handles all traffic on port 80.
# If TLS is terminated upstream (AWS ALB, Cloudflare, etc.), this is the only
# block you need — leave the HTTPS block below commented out.
# For direct TLS termination by nginx, uncomment the redirect below and the
# HTTPS server block further down.
server {
    listen 80;
    server_name localhost;

    # --- Optional: redirect HTTP → HTTPS (uncomment for direct TLS termination) ---
    # return 301 https://$host$request_uri;
    # --- If you enable the redirect above, remove everything below this line
    #     in this server block (it will be handled by the HTTPS block instead). ---

    root /usr/share/nginx/html;
    index index.html;

    # Max upload size (matches backend 10MB limit + overhead)
    client_max_body_size 25m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://i.ytimg.com https://*.googleusercontent.com; connect-src 'self' http://localhost:8000 https://api.shadow.pau.edu.ng; frame-src https://www.youtube.com https://www.youtube-nocookie.com; media-src 'self' blob:; font-src 'self' data:;" always;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # SPA routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets aggressively (Vite output)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # AI endpoints — longer timeouts for generation, SSE streaming support
    location ~ ^/api/v1/smartstudy/(chat|study-plans|quizzes|diagrams) {
        limit_req zone=ai burst=10 nodelay;

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Extended timeouts for AI generation
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;

        # SSE streaming support
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    # General API proxy to backend
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

